name: Build and publish artifacts

on:
  push:
    branches: ['master', 'ci-test', 'ci-test-upstream', 'main', 'build', 'develop']
  pull_request:
    branches: ['master', 'ci-test', 'ci-test-upstream', 'main', 'build', 'develop']
  workflow_dispatch:

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  VCPKG_FEATURE_FLAGS: dependencygraph
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build-and-package:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up GitHub Actions cache environment
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up Vcpkg environment
        shell: bash
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Set up VS2022 toolset
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Install WinPixEventRuntime
        shell: pwsh
        run: |
          $pixUrl = "https://www.nuget.org/api/v2/package/WinPixEventRuntime/1.0.240308001"
          $pixZip = "$env:TEMP\WinPixEventRuntime.zip"
          $pixDir = "$env:TEMP\WinPixEventRuntime"
          Invoke-WebRequest -Uri $pixUrl -OutFile $pixZip
          Expand-Archive -Path $pixZip -DestinationPath $pixDir -Force
          $dllSource = "$pixDir\bin\x64\WinPixEventRuntime.dll"
          $dllTarget = "${{ github.workspace }}\dependencies\FidelityFX-SDK\sdk\libs\pix\bin\x64\WinPixEventRuntime.dll"
          if (Test-Path $dllSource) {
            New-Item -ItemType Directory -Path (Split-Path $dllTarget -Parent) -Force
            Copy-Item $dllSource $dllTarget -Force
          }

      - name: Build FidelityFX SDK
        shell: cmd
        run: |
          cd /d "%GITHUB_WORKSPACE%\dependencies\FidelityFX-SDK\sdk"

          cmake -B build -S . ^
            -DFFX_API_BACKEND=VK ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

          cmake --build build --config Release

          if not exist "build\bin\ffx_sdk\ffx_backend_vk_x64.lib" (
            echo FFX BUILD FAILED
            exit /b 1
          )

      - name: Build dlssg-to-fsr3
        shell: pwsh
        run: |
          $env:VCPKG_DEFAULT_TRIPLET="x64-windows"
          & "${{ github.workspace }}\Make-Release.ps1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dlssg-to-fsr3-ci-test
          path: ${{ github.workspace }}/bin/built-packages/*.zip
          if-no-files-found: error

      - name: Generate release tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: tag
        shell: pwsh
        run: |
          $tag = "release-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "DLSSG to FSR3 - ${{ steps.tag.outputs.tag }}"
          files: ${{ github.workspace }}/bin/built-packages/*.zip
          draft: false
          prerelease: false
          make_latest: true
