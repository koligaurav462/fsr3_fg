;
; Note: this is an optional file for dlssg_to_fsr3. Normal users can safely ignore or delete this INI.
;
; 
; FSR 3 developer debug options
;
[Debug]
EnableDebugOverlay=0
EnableDebugTearLines=0
EnableInterpolatedFramesOnly=0

;
; Frame interpolation tuning parameters
; These values can also be set via environment variables prefixed with DLSSGTOFSR3_
;
[Tuning]
; Optical flow block size (default: 8)
;OpticalFlowBlockSize=8
; HDR luminance range fallback when display info unavailable (defaults: 0.0001, 1000.0)
;HDRLuminanceMin=0.0001
;HDRLuminanceMax=1000.0
; Default vertical FOV in degrees when game provides 0 (default: 90.0)
;DefaultFOV=90.0
; Enable async compute support for frame interpolation (default: 1)
;EnableAsyncCompute=1
; Minimum base FPS threshold - disables frame interpolation when base fps drops below this
; Set to 0 to disable (default: 0), recommended: 24-30
;MinBaseFPS=0
; Presentation delay in milliseconds to smooth GPU utilization and reduce micro-stutter
; Set to 0 to disable (default: 0), recommended: 2-5
;PresentationDelayMs=0

;
; Custom interpolation region (reduces GPU work by skipping static areas)
; Useful for letterboxed/pillarboxed content (e.g. 21:9 on 16:9 display)
; All values default to 0 which means full screen
;
; EnableAutoLetterboxDetection: Automatically detect black bars (letterbox/pillarbox)
; and confine frame interpolation to the active content area.
; When enabled, overrides manual rect values if they are all zero.
;
[GenerationRect]
;Left=0
;Top=0
;Width=0
;Height=0
;EnableAutoLetterboxDetection=0